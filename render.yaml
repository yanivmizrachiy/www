services:
  - type: web
    name: moodle-teacher-hub
    runtime: node
    plan: free
    branch: gemini/ai-studio-sync-20260428-193953
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LTI_CONSUMER_KEY
        value: yaniv-lti-tool
      - key: COOKIE_SECURE
        value: "true"
      - key: LTI_SHARED_SECRET
        sync: false
      - key: VITE_SUPABASE_URL
        value: https://ncoqanascubqkxfvucfz.supabase.co
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
