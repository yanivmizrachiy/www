name: Luz Teddy Public Check

on:
  push:
    paths:
      - 'luz-teddy/**'
      - '.github/workflows/luz-teddy-public-check.yml'
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'

jobs:
  public-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check public app URL
        run: |
          curl -L --fail --max-time 30 https://yanivmizrachiy.github.io/www/luz-teddy/ -o app.html
          grep -q "הצעה לניהול הלו" app.html
      - name: Check public doctor page
        run: |
          curl -L --fail --max-time 30 https://yanivmizrachiy.github.io/www/luz-teddy/doctor.html -o doctor.html
          grep -q "בדיקת" doctor.html
      - name: Check Google Sheet exact tab CSV availability
        run: |
          curl -L --fail --max-time 30 "https://docs.google.com/spreadsheets/d/1bG6RsGZK39lNogtTBS5_voJz0WVcRu2D/gviz/tq?tqx=out:csv&gid=970211231" -o sheet.csv
          test -s sheet.csv
          head -n 5 sheet.csv
