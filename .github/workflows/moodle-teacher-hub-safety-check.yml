name: Moodle Teacher Hub Safety Check

on:
  push:
    branches:
      - gemini/ai-studio-sync-20260428-193953
  workflow_dispatch:

jobs:
  lti-routing-safety:
    name: Verify LTI routing, LTI 1.3 diagnostics, and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Apply automatic LTI routing fix
        run: node scripts/fix-lti-routing-redirect-cache.cjs

      - name: Apply non-breaking LTI 1.3 readiness diagnostics
        run: node scripts/add-lti13-readiness.cjs

      - name: Verify automatic LTI routing fix markers
        run: node scripts/verify-lti-routing-fix.cjs

      - name: Verify LTI 1.3 diagnostic markers
        run: |
          grep -q 'LTI13_DIAGNOSTIC_VERSION' src/server.js
          grep -q '/api/lti13/status' src/server.js
          grep -q '/api/lti13/config' src/server.js
          grep -q '/api/lti13/jwks' src/server.js
          grep -q 'LTI13_OIDC_LOGIN_NOT_IMPLEMENTED_YET' src/server.js
          grep -q 'LTI13_JWT_LAUNCH_NOT_IMPLEMENTED_YET' src/server.js
          grep -q 'const CANONICAL_LTI_ENDPOINT = "/api/lti/launch";' src/server.js

      - name: Check server syntax
        run: node --check src/server.js

      - name: Build production app
        run: npm run build

      - name: Print safety summary
        run: |
          echo "MOODLE_TEACHER_HUB_SAFETY_CHECK_OK"
          echo "Verified: LTI 1.1 routing fix script, non-breaking LTI 1.3 diagnostics, server syntax, and production build."
          echo "This does not verify live Render deploy, real Moodle Participants import, NRPS roster sync, or AGS grade sync."
