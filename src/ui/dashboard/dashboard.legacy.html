<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מרכז משימות ודוחות</title>
  <style>
    :root{--bg:#f4f7fb;--card:#ffffff;--text:#111827;--muted:#6b7280;--primary:#123b69;--accent:#0ea5a4;--line:#e5e7eb;--ok:#065f46;--warn:#92400e;--shadow:0 10px 24px rgba(0,0,0,.08);--radius:18px}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#eef4fb 0%,#f8fbfd 100%);color:var(--text)}
    .layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .side{background:linear-gradient(180deg,#0f2745 0%,#16385f 100%);color:#fff;padding:20px}
    .brand{font-size:24px;font-weight:800;margin-bottom:18px}
    .navbtn{display:block;width:100%;text-align:right;border:0;border-radius:14px;padding:12px 14px;margin:0 0 10px;background:rgba(255,255,255,.08);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
    .navbtn.active,.navbtn:hover{background:rgba(255,255,255,.18)}
    .main{padding:20px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
    .title{font-size:30px;font-weight:800}
    .muted{color:var(--muted)}
    .btn{display:inline-block;border:0;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer;text-decoration:none}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-light{background:#e8eef8;color:var(--primary)}
    .btn-accent{background:var(--accent);color:#fff}
    .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:16px}
    .card{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
    .kpi{font-size:32px;font-weight:800;color:var(--primary);margin-top:6px}
    .section{display:none}.section.active{display:block}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:right;vertical-align:top}
    th{color:var(--muted)}
    .empty{padding:18px;border-radius:14px;background:#fffdf5;color:var(--warn);border:1px solid #f3e4b3}
    .ok{color:var(--ok);font-weight:700}
    .small{font-size:13px}
    ul.clean{margin:0;padding-right:20px}
    code{direction:ltr;display:inline-block}
    @media (max-width:900px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="side">
      <div class="brand">מרכז משימות ודוחות</div>
      <button class="navbtn active" data-section="home">מסך הבית</button>
      <button class="navbtn" data-section="captures">מידע אמיתי מהמרחב</button>
      <button class="navbtn" data-section="students">תלמידים</button>
      <button class="navbtn" data-section="tasks">משימות</button>
      <button class="navbtn" data-section="grades">ציונים</button>
      <button class="navbtn" data-section="activity">פעילות</button>
      <button class="navbtn" data-section="exports">ייצוא</button>
      <button class="navbtn" data-section="settings">הגדרות מרחב</button>
      <button class="navbtn" data-section="launches">כניסות לכלי</button>
    </aside>
    <main class="main">
      <div class="top">
        <div>
          <div class="title">לוח בקרה למורה</div>
          <div id="subline" class="muted">טוען נתוני מרחב...</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <a class="btn btn-primary" href="/dev/login">כניסת בדיקה</a>
          <button class="btn btn-light" id="refreshBtn">רענן נתונים</button>
          <a class="btn btn-accent" href="/api/export/grades.csv" target="_blank">ייצוא לאקסל</a>
        </div>
      </div>

      <section id="home" class="section active"><div class="row" id="kpis"></div><div class="card"><h2>מצב המרחב</h2><div id="homeStatus"></div></div></section>
      <section id="captures" class="section"><div class="card"><h2>מידע אמיתי שהתקבל מהמרחב</h2><div id="capturesWrap"></div></div></section>
      <section id="students" class="section"><div class="card"><h2>תלמידים</h2><div id="studentsWrap"></div></div></section>
      <section id="tasks" class="section"><div class="card"><h2>משימות ונושאים</h2><div id="tasksWrap"></div></div></section>
      <section id="grades" class="section"><div class="card"><h2>דוחות ציונים</h2><div id="gradesWrap"></div></div></section>
      <section id="activity" class="section"><div class="card"><h2>טווחי זמן ותרגול יומי</h2><div id="activityWrap"></div></div></section>
      <section id="exports" class="section"><div class="card"><h2>ייצוא</h2><div id="exportsWrap"></div></div></section>
      <section id="settings" class="section"><div class="card"><h2>הגדרות מרחב</h2><div id="settingsWrap"></div></div></section>
      <section id="launches" class="section"><div class="card"><h2>כניסות לכלי</h2><div id="launchesWrap"></div></div></section>
    </main>
  </div>

  <script>
    async function j(url){ const r = await fetch(url); if(!r.ok) throw new Error(await r.text()); return r.json(); }
    function show(section){ document.querySelectorAll('.section').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.navbtn').forEach(x=>x.classList.remove('active')); document.getElementById(section).classList.add('active'); document.querySelector(`.navbtn[data-section="${section}"]`).classList.add('active'); }
    document.querySelectorAll('.navbtn').forEach(btn=>btn.addEventListener('click', ()=>show(btn.dataset.section)));
    document.getElementById('refreshBtn').addEventListener('click', boot);

    async function loadBootstrap(){
      const b = await j('/api/bootstrap');
      document.getElementById('subline').textContent = `מורה: ${b.teacher.name} | מרחב: ${b.space.title} | מקור: ${b.source}`;
      document.getElementById('kpis').innerHTML = `
        <div class="card"><div>תלמידים</div><div class="kpi">${b.dashboard.totalStudents}</div></div>
        <div class="card"><div>משימות</div><div class="kpi">${b.dashboard.totalTasks}</div></div>
        <div class="card"><div>חסרי הגשה</div><div class="kpi">${b.dashboard.missingSubmissions}</div></div>
        <div class="card"><div>חסרי ציון</div><div class="kpi">${b.dashboard.missingScores}</div></div>
        <div class="card"><div>כניסות</div><div class="kpi">${b.dashboard.launches}</div></div>
      `;
      document.getElementById('homeStatus').innerHTML = `<div class="ok">הליבה פועלת. עכשיו המיקוד הוא לכידת מידע אמיתי מהמרחב וחיבורו למסכי המורה.</div>`;
    }

    async function loadCaptures(){
      const s = await j('/api/moodle-summary');
      const rows = await j('/api/moodle-captures');
      document.getElementById('capturesWrap').innerHTML = `
        <div class="card" style="margin-bottom:12px">
          <div><strong>מספר לכידות:</strong> ${s.capturesCount}</div>
          <div><strong>לכידה אחרונה:</strong> ${s.lastCaptureAt || 'טרם נקלט'}</div>
          <div><strong>מקור אחרון:</strong> ${s.lastSource || '-'}</div>
        </div>
        ${s.availableKeys && s.availableKeys.length ? `
          <div class="card" style="margin-bottom:12px">
            <h3>שדות שהתקבלו בפועל</h3>
            <div class="small">${s.availableKeys.map(x=>`<code>${x}</code>`).join(' | ')}</div>
          </div>
          <div class="card" style="margin-bottom:12px">
            <h3>שדות חשובים</h3>
            <ul class="clean">${Object.entries(s.important || {}).map(([k,v])=>`<li><strong>${k}:</strong> ${v}</li>`).join('')}</ul>
          </div>` : `<div class="empty">עדיין לא בוצעה לכידה אמיתית מ־LTI 1.1 מתוך המרחב.</div>`}
        ${rows.length ? `<div class="card"><h3>לכידות אחרונות</h3><table><thead><tr><th>זמן</th><th>מקור</th><th>מספר שדות</th><th>שדות חשובים</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${x.createdAt}</td><td>${x.source}</td><td>${x.rawCount}</td><td>${Object.entries(x.important||{}).map(([k,v])=>`${k}: ${v}`).join('<br>')}</td></tr>`).join('')}</tbody></table></div>` : ``}
      `;
    }

    async function loadStudents(){ const rows = await j('/api/students'); document.getElementById('studentsWrap').innerHTML = rows.length ? `<table><thead><tr><th>שם תלמיד</th><th>כיתה</th><th>קבוצה</th><th>פעילות אחרונה</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${x.name||''}</td><td>${x.className||'-'}</td><td>${x.groupName||'-'}</td><td>${x.lastActivityAt||'-'}</td></tr>`).join('')}</tbody></table>` : `<div class="empty">עדיין אין נתוני תלמידים אמיתיים מהמרחב.</div>`; }
    async function loadTasks(){ const rows = await j('/api/tasks'); document.getElementById('tasksWrap').innerHTML = rows.length ? `<table><thead><tr><th>פרק</th><th>מספר שאלות</th><th>שם משימה</th><th>קישור</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${x.topicName||'-'}</td><td>${x.questionsCount ?? '-'}</td><td>${x.name||''}</td><td>${x.url ? `<a class="btn btn-light" href="${x.url}" target="_blank">פתח</a>` : '-'}</td></tr>`).join('')}</tbody></table>` : `<div class="empty">עדיין אין משימות ונושאים אמיתיים מהמרחב.</div>`; }
    async function loadGrades(){ const rows = await j('/api/grades'); document.getElementById('gradesWrap').innerHTML = rows.length ? `<table><thead><tr><th>תלמיד</th><th>קבוצה</th><th>משימה</th><th>ציון</th><th>תאריך</th><th>ניסיונות</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${x.studentName||''}</td><td>${x.groupName||'-'}</td><td>${x.taskName||''}</td><td>${x.grade ?? '-'}</td><td>${x.date||'-'}</td><td>${x.attemptsCount ?? '-'}</td></tr>`).join('')}</tbody></table>` : `<div class="empty">עדיין אין ציונים אמיתיים מהמרחב.</div>`; }
    async function loadActivity(){ const data = await j('/api/activity'); document.getElementById('activityWrap').innerHTML = data.dailySummaries.length ? `<table><thead><tr><th>תאריך</th><th>טווחי זמן</th><th>סך הכול ביום</th></tr></thead><tbody>${data.dailySummaries.map(x=>`<tr><td>${x.date}</td><td>${x.ranges.map(r=>`${r.start}-${r.end}`).join('<br>')}</td><td>${x.totalMinutes} דקות</td></tr>`).join('')}</tbody></table>` : `<div class="empty">עדיין אין זמני פעילות אמיתיים מהמרחב.</div>`; }
    async function loadSettings(){ const s = await j('/api/settings'); document.getElementById('settingsWrap').innerHTML = `<ul class="clean"><li>הצגת הגדרות מרחב: ${s.allowTeacherSettingsView ? 'פעיל' : 'כבוי'}</li><li>ייצוא: ${s.allowExport ? 'פעיל' : 'כבוי'}</li><li>סנכרון אחרון: ${s.lastSyncAt || 'טרם סונכרן'}</li></ul>`; document.getElementById('exportsWrap').innerHTML = `<div class="ok">ייצוא CSV מוכן. קובץ אקסל יופק על בסיס נתוני ציונים אמיתיים שייכנסו למערכת.</div>`; }
    async function loadLaunches(){ const rows = await j('/api/launches'); document.getElementById('launchesWrap').innerHTML = rows.length ? `<table><thead><tr><th>זמן</th><th>סוג</th><th>מורה</th><th>מרחב</th><th>תקין</th><th>שגיאה</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${x.createdAt||''}</td><td>${x.type||''}</td><td>${x.teacherName||''}</td><td>${x.spaceTitle||''}</td><td>${x.ok?'כן':'לא'}</td><td>${x.error||'-'}</td></tr>`).join('')}</tbody></table>` : `<div class="empty">עדיין אין כניסות שמורות.</div>`; }
    async function boot(){ try{ await loadBootstrap(); await Promise.all([loadCaptures(), loadStudents(), loadTasks(), loadGrades(), loadActivity(), loadSettings(), loadLaunches()]); } catch(err){ document.getElementById('subline').textContent = 'יש להיכנס תחילה דרך הכלי או דרך כניסת בדיקה.'; } }
    boot();
  </script>
</body>
</html>
