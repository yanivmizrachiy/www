<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Moodle Teacher Hub</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#eef4fb;color:#111827}
    .layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .sidebar{background:linear-gradient(180deg,#193457,#27486e);color:#fff;padding:18px;box-shadow:0 0 30px rgba(0,0,0,.15)}
    .brand{font-size:28px;font-weight:800;margin-bottom:18px}
    .nav a{display:block;background:rgba(255,255,255,.08);color:#fff;text-decoration:none;padding:14px 16px;border-radius:14px;margin-bottom:10px;font-weight:700}
    .nav a:hover{background:rgba(255,255,255,.16)}
    .main{padding:22px}
    .hero{background:linear-gradient(90deg,#f7fbff,#e9f2ff);border-radius:22px;padding:22px;box-shadow:0 12px 28px rgba(0,0,0,.08);margin-bottom:18px}
    .hero h1{margin:0 0 10px;font-size:38px}
    .muted{color:#54657b}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{display:inline-block;background:#123b69;color:#fff;padding:12px 16px;border-radius:12px;text-decoration:none;font-weight:700}
    .btn.secondary{background:#dbe7f5;color:#123b69}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:18px}
    .card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 10px 24px rgba(0,0,0,.08)}
    .kpi .label{color:#516176;font-weight:700}
    .kpi .value{font-size:42px;font-weight:900;color:#183a63}
    .empty{padding:16px;border-radius:16px;background:#fffdf5;color:#92400e;border:1px solid #f3e4b3}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px;border-bottom:1px solid #eceff4;text-align:right}
    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      .sidebar{order:2}
      .main{order:1}
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">מרכז משימות ודוחות</div>
      <nav class="nav">
        <a href="/">מסך הבית</a>
        <a href="/api/moodle-summary" target="_blank" rel="noopener noreferrer">מידע אמיתי מהמרחב</a>
        <a href="/api/students" target="_blank" rel="noopener noreferrer">תלמידים</a>
        <a href="/api/tasks" target="_blank" rel="noopener noreferrer">משימות</a>
        <a href="/api/grades" target="_blank" rel="noopener noreferrer">ציונים</a>
        <a href="/api/activity" target="_blank" rel="noopener noreferrer">פעילות</a>
        <a href="/api/export/grades.csv" target="_blank" rel="noopener noreferrer">ייצוא</a>
        <a href="/api/settings" target="_blank" rel="noopener noreferrer">הגדרות מרחב</a>
        <a href="/dev/login">כניסת פיתוח</a>
      </nav>
    </aside>

    <main class="main">
      <section class="hero">
        <h1>לוח בקרה למורה</h1>
        <div id="subline" class="muted">טוען נתונים...</div>
        <div class="actions">
          <a class="btn" href="/dev/login">כניסת בדיקה</a>
          <a class="btn secondary" href="/api/export/grades.csv" target="_blank" rel="noopener noreferrer">ייצוא לאקסל/CSV</a>
        </div>
      </section>

      <section class="grid" id="stats"></section>

      <section class="card" style="margin-bottom:18px">
        <h2>מצב המרחב</h2>
        <div id="statusBox" class="muted">בודק מצב...</div>
      </section>

      <section class="card" style="margin-bottom:18px">
        <h2>לכידת Moodle</h2>
        <div id="capturesWrap"></div>
      </section>

      <section class="card">
        <h2>יומן Launches</h2>
        <div id="launchesWrap"></div>
      </section>
    </main>
  </div>

  <script>
    async function j(url){
      const r = await fetch(url);
      if(!r.ok) throw new Error(await r.text());
      return r.json();
    }

    function statBox(label, value){
      return '<div class="card kpi"><div class="label">' + label + '</div><div class="value">' + value + '</div></div>';
    }

    async function boot(){
      try{
        const b = await j('/api/bootstrap');
        document.getElementById('subline').textContent =
          b.teacher.name + ' | מרחב: ' + b.space.title + ' | מקור: ' + b.source;

        document.getElementById('stats').innerHTML =
          statBox('תלמידים', b.dashboard.totalStudents) +
          statBox('משימות', b.dashboard.totalTasks) +
          statBox('ציונים', b.dashboard.totalGrades) +
          statBox('סשנים', b.dashboard.totalSessions) +
          statBox('לכידות', b.dashboard.moodleCaptures) +
          statBox('כניסות', b.dashboard.launches);

        document.getElementById('statusBox').innerHTML =
          '<div>השקה פעילה: <strong>' + (b.dataReady.hasRealLaunch ? 'כן' : 'עדיין לא') + '</strong></div>' +
          '<div>יש תלמידים: <strong>' + (b.dataReady.hasStudents ? 'כן' : 'לא') + '</strong></div>' +
          '<div>יש משימות: <strong>' + (b.dataReady.hasTasks ? 'כן' : 'לא') + '</strong></div>' +
          '<div>יש ציונים: <strong>' + (b.dataReady.hasGrades ? 'כן' : 'לא') + '</strong></div>' +
          '<div>יש פעילות: <strong>' + (b.dataReady.hasActivity ? 'כן' : 'לא') + '</strong></div>';

        const s = await j('/api/moodle-summary');
        document.getElementById('capturesWrap').innerHTML =
          s.availableKeys && s.availableKeys.length
            ? '<div><strong>כמות לכידות:</strong> ' + s.capturesCount + '</div>' +
              '<div><strong>מקור אחרון:</strong> ' + (s.lastSource || '') + '</div>' +
              '<div><strong>מפתחות שנקלטו:</strong> ' + s.availableKeys.join(', ') + '</div>'
            : '<div class="empty">עדיין אין לכידת Moodle אמיתית.</div>';

        const launches = await j('/api/launches');
        document.getElementById('launchesWrap').innerHTML =
          launches.length
            ? '<table><thead><tr><th>תאריך</th><th>סוג</th><th>מורה</th><th>מרחב</th></tr></thead><tbody>' +
              launches.map(x => '<tr><td>' + x.createdAt + '</td><td>' + x.type + '</td><td>' + x.teacherName + '</td><td>' + x.spaceTitle + '</td></tr>').join('') +
              '</tbody></table>'
            : '<div class="empty">עדיין אין launches.</div>';
      } catch(err){
        document.getElementById('subline').textContent = 'אין session פעיל. לחץ על "כניסת בדיקה".';
        document.getElementById('stats').innerHTML = '<div class="empty">המערכת מוכנה, אבל עדיין צריך login או launch.</div>';
        document.getElementById('statusBox').innerHTML = '<div class="empty">ממתין ל-session פעיל.</div>';
        document.getElementById('capturesWrap').innerHTML = '<div class="empty">ממתין לנתונים.</div>';
        document.getElementById('launchesWrap').innerHTML = '<div class="empty">ממתין לנתונים.</div>';
      }
    }

    boot();
  </script>
</body>
</html>
