<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ניקוי גרסה ישנה</title><style>body{margin:0;font-family:Arial,sans-serif;background:#fbf6ea;color:#101827;display:grid;place-items:center;min-height:100vh;padding:24px;text-align:center}main{max-width:640px;background:#fffdf8;border:1px solid #eadfcb;border-radius:24px;padding:28px;box-shadow:0 18px 50px #10182722}b{font-size:1.4rem}a{display:inline-block;margin-top:18px;font-weight:900;color:#101827}</style></head><body><main><b>מנקה גרסה ישנה...</b><p>המערכת מוחקת Cache ישן כדי שלא יוצגו רכיבי דמו ישנים.</p><a href="index.html?v=clean">כניסה לאתר</a></main><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)))}localStorage.clear();sessionStorage.clear()}catch(e){}location.replace('index.html?v='+Date.now())})();</script></body></html>
