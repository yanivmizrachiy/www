<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ניהול לוז בחטיבת הביניים</title>
<link rel="stylesheet" href="clean.css?v=fbc2c896">
<link rel="stylesheet" href="exam-clock.css?v=444cade">
<style>.todayBanner{display:none!important}</style>
</head>
<body>
<header class="pageTitle">
  <h1>ניהול לוז בחטיבת הביניים</h1>
  <div class="liveClock" aria-live="polite">
    <div class="clockTime" id="clockTime">--:--:--</div>
    <div class="clockDate" id="clockDate">טוען תאריך...</div>
  </div>
</header>
<div class="app" id="app"></div>
<script src="clean-view.js?v=49e7303"></script>
<script>
(function(){
  var stableDate=null;

  function todayText(){
    var now=new Date();
    var weekday=new Intl.DateTimeFormat('he-IL',{weekday:'long'}).format(now);
    var date=new Intl.DateTimeFormat('he-IL',{day:'numeric',month:'long',year:'numeric'}).format(now);
    return 'היום '+weekday+' — '+date;
  }

  function createStableDateLine(){
    var current=document.getElementById('clockDate');
    if(!current)return;

    if(current.dataset && current.dataset.stableToday==='1'){
      stableDate=current;
      return;
    }

    var clone=current.cloneNode(false);
    clone.id='clockDate';
    clone.className=current.className;
    clone.dataset.stableToday='1';
    current.parentNode.replaceChild(clone,current);
    stableDate=clone;
  }

  function updateTodayLine(){
    createStableDateLine();

    if(stableDate){
      stableDate.textContent=todayText();
    }

    document.querySelectorAll('.todayBanner').forEach(function(el){
      el.remove();
    });

    var title='ניהול לוז בחטיבת הביניים';
    var h=document.querySelector('.pageTitle h1');
    if(h)h.textContent=title;
    document.title=title;
  }

  updateTodayLine();
  setInterval(updateTodayLine,1000);
})();
</script>
</body>
</html>
