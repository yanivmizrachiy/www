<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="68%" stop-color="#253046"/>
      <stop offset="100%" stop-color="#6b4a16"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8dc93"/>
      <stop offset="100%" stop-color="#b8872f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#101827" flood-opacity="0.20"/>
    </filter>
    <style>
      .he{
        font-family:"Noto Sans Hebrew","Noto Sans Hebrew UI","Noto Sans","Arial",sans-serif;
        direction:rtl;
        unicode-bidi:bidi-override;
        text-anchor:middle;
      }
      .title{font-size:70px;font-weight:900;fill:#ffffff;}
      .sub{font-size:36px;font-weight:800;fill:#f8fafc;}
      .hint{font-size:30px;font-weight:800;fill:#fef3c7;}
      .small{font-size:27px;font-weight:800;fill:#475569;}
      .url{font-size:25px;font-weight:700;fill:#64748b;direction:ltr;unicode-bidi:normal;text-anchor:middle;}
    </style>
  </defs>

  <rect width="1240" height="1754" fill="#fbf6ea"/>
  <circle cx="1180" cy="-20" r="420" fill="#ead7ad"/>
  <circle cx="-110" cy="520" r="430" fill="#e8eefb"/>
  <rect y="1430" width="1240" height="324" fill="#fffdf8"/>

  <rect x="82" y="165" width="1076" height="710" rx="66" fill="#101827" filter="url(#shadow)"/>
  <rect x="112" y="198" width="1016" height="642" rx="52" fill="url(#hero)"/>
  <rect x="154" y="770" width="284" height="15" rx="7" fill="#b8872f"/>

  <text class="he title" x="620" y="360">הצעה לניהול הלו״ז</text>
  <text class="he title" x="620" y="455">של חטיבת הביניים</text>
  <text class="he sub" x="620" y="570">קובץ כניסה מהיר לאתר הלו״ז</text>
  <text class="he hint" x="620" y="630">לחיצה על ENTER פותחת את האתר החי</text>

  <rect x="380" y="920" width="480" height="145" rx="48" fill="#b8872f" filter="url(#shadow)"/>
  <rect x="392" y="932" width="456" height="121" rx="41" fill="url(#gold)"/>
  <text x="620" y="1015" font-family="Arial,sans-serif" font-size="64" font-weight="900" fill="#101827" text-anchor="middle">ENTER</text>

  <rect x="120" y="1190" width="1000" height="230" rx="42" fill="#fffdf8" stroke="#eadfcb" stroke-width="5"/>
  <text class="he small" x="620" y="1280">קישור קבוע להורדה ולשליחה ב־WhatsApp</text>
  <text class="url" x="620" y="1345">https://yanivmizrachiy.github.io/www/downloads/hazaa-luz-teddy/hazaa-luz-teddy.pdf</text>

  <text class="he small" x="620" y="1605">PDF קבוע · דף הורדה קבוע · מתאים לשליחה מהטלפון</text>
</svg>
