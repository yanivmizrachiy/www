<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>הצעה לניהול הלוז</title>
<style>
:root{--ink:#101827;--gold:#b8872f;--cream:#fbf6ea;--paper:#fffdf8;--line:#eadfcb}
*{box-sizing:border-box}
body{margin:0;min-height:100svh;display:grid;place-items:center;direction:rtl;font-family:Arial,'Segoe UI',system-ui,sans-serif;background:radial-gradient(circle at 90% -10%,rgba(184,135,47,.24),transparent 24rem),radial-gradient(circle at 0% 18%,rgba(29,78,216,.10),transparent 22rem),linear-gradient(180deg,var(--cream),#fff);color:var(--ink);padding:18px}
.card{width:min(720px,100%);background:var(--paper);border:1px solid var(--line);border-radius:34px;padding:24px;box-shadow:0 24px 70px rgba(16,24,39,.16)}
.hero{border-radius:28px;padding:26px;background:linear-gradient(135deg,#101827,#253046 70%,#6b4a16);color:white;box-shadow:0 20px 50px rgba(16,24,39,.22)}
h1{margin:0;font-size:clamp(1.65rem,8vw,3rem);line-height:1.12;font-weight:900}
h1:after{content:"";display:block;width:96px;height:6px;border-radius:99px;background:linear-gradient(90deg,#fde68a,var(--gold));margin-top:16px}
p{font-size:1.05rem;line-height:1.6;color:#475569;font-weight:800}
.actions{display:grid;gap:12px;margin-top:18px}
a{min-height:60px;border-radius:999px;display:grid;place-items:center;text-decoration:none;font-size:1.16rem;font-weight:900}
.download{background:linear-gradient(135deg,#f6d78b,var(--gold));color:#101827}
.open{background:#101827;color:white}
.site{background:#fff;border:1px solid var(--line);color:#101827}
.small{font-size:.9rem;color:#64748b;text-align:center;margin-top:14px;word-break:break-all;direction:ltr}
</style>
</head>
<body>
<main class="card">
  <section class="hero">
    <h1>הצעה לניהול הלו״ז של חטיבת הביניים</h1>
  </section>
  <p>קישור קבוע להורדת PDF ולשליחה ב־WhatsApp.</p>
  <div class="actions">
    <a class="download" href="./hazaa-luz-teddy.pdf" download>הורדת PDF</a>
    <a class="open" href="./hazaa-luz-teddy.pdf">פתיחת PDF</a>
    <a class="site" href="https://yanivmizrachiy.github.io/www/luz-teddy/clean.html?v=1511f59">פתיחת אתר הלו״ז</a>
  </div>
  <div class="small">https://yanivmizrachiy.github.io/www/downloads/hazaa-luz-teddy/hazaa-luz-teddy.pdf</div>
</main>
</body>
</html>
